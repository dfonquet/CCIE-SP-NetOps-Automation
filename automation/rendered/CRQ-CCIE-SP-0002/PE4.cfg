route-policy BGP-PASS
  pass
end-policy
!
router bgp 500
 vrf CUST-A
  neighbor 192.0.3.6
   address-family ipv4 unicast
    route-policy BGP-PASS in
    route-policy BGP-PASS out
  !
  neighbor 2001:db8:de::6
   address-family ipv6 unicast
    route-policy BGP-PASS in
    route-policy BGP-PASS out
!
